name: Kernel Tests

on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'tests/Cosmos.TestRunner.**'
      - 'tests/Kernels/**'
      - '.github/workflows/kernel-tests.yml'
      - '.github/workflows/kernel-setup.yml'
      - '.github/workflows/kernel-test-run.yml'
      - '.github/workflows/kernel-test-results.yml'
  pull_request:
    branches: [ "**" ]
    paths:
      - 'src/**'
      - 'tests/Cosmos.TestRunner.**'
      - 'tests/Kernels/**'
      - '.github/workflows/kernel-tests.yml'
      - '.github/workflows/kernel-setup.yml'
      - '.github/workflows/kernel-test-run.yml'
      - '.github/workflows/kernel-test-results.yml'
  workflow_dispatch:
    inputs:
      architecture:
        description: 'Architecture to test'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - x64
          - arm64

permissions:
  contents: read
  checks: write
  issues: write
  pull-requests: write

jobs:
  # ── Setup ─────────────────────────────────────────────────────────────────────
  setup:
    uses: ./.github/workflows/kernel-setup.yml

  # ── HelloWorld ────────────────────────────────────────────────────────────────
  helloworld-tests:
    needs: setup
    uses: ./.github/workflows/kernel-test-run.yml
    with:
      suite_name: HelloWorld
      suite_id: helloworld
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.HelloWorld
      timeout_x64: 60
      timeout_arm64: 90
      step_timeout_minutes: 5

  helloworld-results:
    needs: helloworld-tests
    if: always()
    uses: ./.github/workflows/kernel-test-results.yml
    with:
      suite_name: HelloWorld
      suite_id: helloworld
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.HelloWorld
      event_name: ${{ github.event_name }}
      head_ref: ${{ github.head_ref || github.ref_name }}

  # ── Memory ────────────────────────────────────────────────────────────────────
  memory-tests:
    needs: setup
    uses: ./.github/workflows/kernel-test-run.yml
    with:
      suite_name: Memory
      suite_id: memory
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.Memory
      timeout_x64: 120
      timeout_arm64: 180
      step_timeout_minutes: 10

  memory-results:
    needs: memory-tests
    if: always()
    uses: ./.github/workflows/kernel-test-results.yml
    with:
      suite_name: Memory
      suite_id: memory
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.Memory
      event_name: ${{ github.event_name }}
      head_ref: ${{ github.head_ref || github.ref_name }}

  # ── TypeCasting ───────────────────────────────────────────────────────────────
  typecasting-tests:
    needs: setup
    uses: ./.github/workflows/kernel-test-run.yml
    with:
      suite_name: TypeCasting
      suite_id: typecasting
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.TypeCasting
      timeout_x64: 120
      timeout_arm64: 180
      step_timeout_minutes: 10

  typecasting-results:
    needs: typecasting-tests
    if: always()
    uses: ./.github/workflows/kernel-test-results.yml
    with:
      suite_name: TypeCasting
      suite_id: typecasting
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.TypeCasting
      event_name: ${{ github.event_name }}
      head_ref: ${{ github.head_ref || github.ref_name }}

  # ── Timer ─────────────────────────────────────────────────────────────────────
  timer-tests:
    needs: setup
    uses: ./.github/workflows/kernel-test-run.yml
    with:
      suite_name: Timer
      suite_id: timer
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.Timer
      timeout_x64: 120
      timeout_arm64: 180
      step_timeout_minutes: 10

  timer-results:
    needs: timer-tests
    if: always()
    uses: ./.github/workflows/kernel-test-results.yml
    with:
      suite_name: Timer
      suite_id: timer
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.Timer
      event_name: ${{ github.event_name }}
      head_ref: ${{ github.head_ref || github.ref_name }}

  # ── Network ───────────────────────────────────────────────────────────────────
  network-tests:
    needs: setup
    uses: ./.github/workflows/kernel-test-run.yml
    with:
      suite_name: Network
      suite_id: network
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.Network
      timeout_x64: 120
      timeout_arm64: 180
      step_timeout_minutes: 10

  network-results:
    needs: network-tests
    if: always()
    uses: ./.github/workflows/kernel-test-results.yml
    with:
      suite_name: Network
      suite_id: network
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.Network
      event_name: ${{ github.event_name }}
      head_ref: ${{ github.head_ref || github.ref_name }}

  # ── Runtime ───────────────────────────────────────────────────────────────────
  runtime-tests:
    needs: setup
    uses: ./.github/workflows/kernel-test-run.yml
    with:
      suite_name: Runtime
      suite_id: runtime
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.Runtime
      timeout_x64: 120
      timeout_arm64: 180
      step_timeout_minutes: 10

  runtime-results:
    needs: runtime-tests
    if: always()
    uses: ./.github/workflows/kernel-test-results.yml
    with:
      suite_name: Runtime
      suite_id: runtime
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.Runtime
      event_name: ${{ github.event_name }}
      head_ref: ${{ github.head_ref || github.ref_name }}

  # ── Threading ─────────────────────────────────────────────────────────────────
  threading-tests:
    needs: setup
    uses: ./.github/workflows/kernel-test-run.yml
    with:
      suite_name: Threading
      suite_id: threading
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.Threading
      timeout_x64: 120
      timeout_arm64: 180
      step_timeout_minutes: 10

  threading-results:
    needs: threading-tests
    if: always()
    uses: ./.github/workflows/kernel-test-results.yml
    with:
      suite_name: Threading
      suite_id: threading
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.Threading
      event_name: ${{ github.event_name }}
      head_ref: ${{ github.head_ref || github.ref_name }}

  # ── Graphic ───────────────────────────────────────────────────────────────────
  graphic-tests:
    needs: setup
    uses: ./.github/workflows/kernel-test-run.yml
    with:
      suite_name: Graphic
      suite_id: graphic
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.Graphic
      timeout_x64: 60
      timeout_arm64: 90
      step_timeout_minutes: 5

  graphic-results:
    needs: graphic-tests
    if: always()
    uses: ./.github/workflows/kernel-test-results.yml
    with:
      suite_name: Graphic
      suite_id: graphic
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.Graphic
      event_name: ${{ github.event_name }}
      head_ref: ${{ github.head_ref || github.ref_name }}

  # ── Summary ───────────────────────────────────────────────────────────────────
  test-summary:
    name: Test Summary
    runs-on: ubuntu-24.04
    needs: [ helloworld-results, memory-results, typecasting-results, timer-results, network-results, runtime-results, threading-results, graphic-results ]
    if: always()
    steps:
      - name: 📊 Generate Summary
        run: |
          echo "# 🧪 Kernel Test Suite Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY

          add_row() {
            local name=$1
            local result=$2
            if [ "$result" = "success" ]; then
              echo "| $name | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $name | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
            fi
          }

          add_row "HelloWorld"  "${{ needs.helloworld-tests.result }}"
          add_row "Memory"      "${{ needs.memory-tests.result }}"
          add_row "TypeCasting" "${{ needs.typecasting-tests.result }}"
          add_row "Timer"       "${{ needs.timer-tests.result }}"
          add_row "Network"     "${{ needs.network-tests.result }}"
          add_row "Runtime"     "${{ needs.runtime-tests.result }}"
          add_row "Threading"   "${{ needs.threading-tests.result }}"
          add_row "Graphic"     "${{ needs.graphic-tests.result }}"

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run ID:** ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
