name: Kernel Coverage

on:
  pull_request:
    types: [labeled, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to run coverage on (optional)'
        required: false
        type: string

permissions:
  contents: read
  checks: write
  issues: write
  pull-requests: write

jobs:
  # ── Setup ─────────────────────────────────────────────────────────────────────
  setup:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-coverage')
    uses: ./.github/workflows/kernel-setup.yml

  # ── HelloWorld ────────────────────────────────────────────────────────────────
  helloworld-tests:
    needs: setup
    if: always() && needs.setup.result == 'success'
    uses: ./.github/workflows/kernel-test-run.yml
    with:
      suite_name: HelloWorld
      suite_id: helloworld
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.HelloWorld
      timeout_x64: 60
      timeout_arm64: 90
      step_timeout_minutes: 5
      coverage: true

  # ── Memory ────────────────────────────────────────────────────────────────────
  memory-tests:
    needs: setup
    if: always() && needs.setup.result == 'success'
    uses: ./.github/workflows/kernel-test-run.yml
    with:
      suite_name: Memory
      suite_id: memory
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.Memory
      timeout_x64: 120
      timeout_arm64: 180
      step_timeout_minutes: 10
      coverage: true

  # ── TypeCasting ───────────────────────────────────────────────────────────────
  typecasting-tests:
    needs: setup
    if: always() && needs.setup.result == 'success'
    uses: ./.github/workflows/kernel-test-run.yml
    with:
      suite_name: TypeCasting
      suite_id: typecasting
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.TypeCasting
      timeout_x64: 120
      timeout_arm64: 180
      step_timeout_minutes: 10
      coverage: true

  # ── Timer ─────────────────────────────────────────────────────────────────────
  timer-tests:
    needs: setup
    if: always() && needs.setup.result == 'success'
    uses: ./.github/workflows/kernel-test-run.yml
    with:
      suite_name: Timer
      suite_id: timer
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.Timer
      timeout_x64: 120
      timeout_arm64: 180
      step_timeout_minutes: 10
      coverage: true

  # ── Network ───────────────────────────────────────────────────────────────────
  network-tests:
    needs: setup
    if: always() && needs.setup.result == 'success'
    uses: ./.github/workflows/kernel-test-run.yml
    with:
      suite_name: Network
      suite_id: network
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.Network
      timeout_x64: 120
      timeout_arm64: 180
      step_timeout_minutes: 10
      coverage: true

  # ── Threading ─────────────────────────────────────────────────────────────────
  threading-tests:
    needs: setup
    if: always() && needs.setup.result == 'success'
    uses: ./.github/workflows/kernel-test-run.yml
    with:
      suite_name: Threading
      suite_id: threading
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.Threading
      timeout_x64: 120
      timeout_arm64: 180
      step_timeout_minutes: 10
      coverage: true

  # ── Graphic ───────────────────────────────────────────────────────────────────
  graphic-tests:
    needs: setup
    if: always() && needs.setup.result == 'success'
    uses: ./.github/workflows/kernel-test-run.yml
    with:
      suite_name: Graphic
      suite_id: graphic
      kernel_path: tests/Kernels/Cosmos.Kernel.Tests.Graphic
      timeout_x64: 60
      timeout_arm64: 90
      step_timeout_minutes: 5
      coverage: true

  # ── Coverage Report ──────────────────────────────────────────────────────────
  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [helloworld-tests, memory-tests, typecasting-tests, timer-tests, network-tests, threading-tests, graphic-tests]
    if: always() && (github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-coverage'))
    permissions:
      pull-requests: write
    steps:
      - name: 📥 Checkout (for aggregation script)
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false

      - name: 📥 Download Coverage Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: ./coverage
          merge-multiple: false

      - name: 📊 Generate Coverage Summary
        id: coverage
        run: python3 .github/scripts/aggregate-coverage.py

      - name: 💬 Add Coverage PR Comment
        if: steps.coverage.outputs.found_data == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        continue-on-error: true
        with:
          header: code-coverage
          path: /tmp/coverage_pr_comment.md
