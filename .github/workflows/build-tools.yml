name: Build Tools

on:
  workflow_dispatch:

env:
  LLVM_VERSION: "22.1.3"
  LLVM_TAG: "llvmorg-22.1.3"
  XORRISO_VERSION: "1.5.8.pl01"
  XORRISO_DIR: "1.5.8"
  YASM_VERSION: "1.3.0"
  QEMU_VERSION: "10.2.2"

jobs:
  # ═══════════════════════════════════════════════════════════════════════
  #  LLVM (Clang + LLD) — replaces GCC cross-compilers
  #  Clang handles both x64 and ARM64 via --target= flag
  # ═══════════════════════════════════════════════════════════════════════
  build-llvm:
    name: LLVM ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
          - target: darwin-arm64
          - target: win-x64
    steps:
      - name: Download & repackage LLVM
        shell: bash
        run: |
          # Map target to official LLVM pre-built release archive
          case "${{ matrix.target }}" in
            linux-x64)    ARCHIVE="LLVM-${LLVM_VERSION}-Linux-X64.tar.xz" ; EXT="" ;;
            darwin-arm64) ARCHIVE="LLVM-${LLVM_VERSION}-macOS-ARM64.tar.xz" ; EXT="" ;;
            win-x64)      ARCHIVE="clang+llvm-${LLVM_VERSION}-x86_64-pc-windows-msvc.tar.xz" ; EXT=".exe" ;;
          esac

          echo "Downloading ${ARCHIVE}..."
          curl -L -o llvm-prebuilt.tar.xz \
            "https://github.com/llvm/llvm-project/releases/download/${LLVM_TAG}/${ARCHIVE}"

          echo "Extracting..."
          tar xf llvm-prebuilt.tar.xz
          LLVM_DIR=$(ls -d */ | head -1)
          echo "Extracted to ${LLVM_DIR}"

          # Copy clang + lld binaries (dereference symlinks with -L)
          mkdir -p pkg/llvm-tools/bin
          cp -L "${LLVM_DIR}bin/clang${EXT}" pkg/llvm-tools/bin/

          # lld may be named ld.lld or lld — handle both
          if [ -f "${LLVM_DIR}bin/ld.lld${EXT}" ]; then
            cp -L "${LLVM_DIR}bin/ld.lld${EXT}" pkg/llvm-tools/bin/
          elif [ -f "${LLVM_DIR}bin/lld${EXT}" ]; then
            cp -L "${LLVM_DIR}bin/lld${EXT}" pkg/llvm-tools/bin/ld.lld${EXT}
          fi

          # Copy freestanding headers
          CLANG_INCLUDE=$(find "${LLVM_DIR}" -path "*/lib/clang/*/include" -type d | head -1)
          if [ -n "$CLANG_INCLUDE" ]; then
            CLANG_VER=$(basename "$(dirname "$CLANG_INCLUDE")")
            mkdir -p "pkg/llvm-tools/lib/clang/$CLANG_VER"
            cp -r "$CLANG_INCLUDE" "pkg/llvm-tools/lib/clang/$CLANG_VER/"
          fi

          # Strip binaries when possible (only native linux-x64)
          if [ "${{ matrix.target }}" = "linux-x64" ]; then
            strip pkg/llvm-tools/bin/clang pkg/llvm-tools/bin/ld.lld 2>/dev/null || true
          fi

          # Free disk space before packaging
          rm -rf "${LLVM_DIR}" llvm-prebuilt.tar.xz

          # Verify
          ls -la pkg/llvm-tools/bin/
          find pkg/llvm-tools/lib -type f | head -20 || true

          # Stamp the bundle so ToolResolver can compare against system tools
          echo "${LLVM_VERSION}" > pkg/llvm-tools/VERSION

          # Package
          if [ "${{ matrix.target }}" = "win-x64" ]; then
            cd pkg && zip -r ../llvm-tools-${LLVM_VERSION}-${{ matrix.target }}.zip llvm-tools
          else
            tar czf llvm-tools-${LLVM_VERSION}-${{ matrix.target }}.tar.gz -C pkg llvm-tools
          fi

      # Smoke test: the upstream LLVM binaries are statically linked, but cross-
      # platform packaging (esp. Windows on a Linux runner) can still go wrong.
      # Run only on linux-x64 since that's the only target the runner can execute.
      - name: Smoke test bundle
        if: matrix.target == 'linux-x64'
        shell: bash
        env:
          PATH: /usr/bin:/bin
        run: |
          ./pkg/llvm-tools/bin/clang --version
          ./pkg/llvm-tools/bin/ld.lld --version

      - uses: actions/upload-artifact@v4
        with:
          name: llvm-tools-${{ matrix.target }}
          path: llvm-tools-*.*

  # ═══════════════════════════════════════════════════════════════════════
  #  xorriso — build from GNU source tarball
  #  Linux job also cross-compiles for Windows using mingw-w64
  # ═══════════════════════════════════════════════════════════════════════
  build-xorriso:
    name: xorriso ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-latest
            target: darwin-arm64
          - os: windows-latest
            target: win-x64
    steps:
      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          install: make gcc pkg-config libiconv-devel

      - name: Download xorriso source (Unix)
        if: runner.os != 'Windows'
        run: |
          curl -L -o xorriso.tar.gz \
            "https://www.gnu.org/software/xorriso/xorriso-${{ env.XORRISO_VERSION }}.tar.gz"
          tar xzf xorriso.tar.gz

      - name: Download xorriso source (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          curl -L -o xorriso.tar.gz \
            "https://www.gnu.org/software/xorriso/xorriso-${{ env.XORRISO_VERSION }}.tar.gz"
          tar xzf xorriso.tar.gz

      - name: Build xorriso (Unix)
        if: runner.os != 'Windows'
        run: |
          NPROC=$(nproc 2>/dev/null || sysctl -n hw.ncpu)
          cd xorriso-${{ env.XORRISO_DIR }}
          ./configure --disable-libreadline --disable-libacl --disable-xattr
          make -j$NPROC
          strip xorriso/xorriso

      - name: Build xorriso (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          cd xorriso-${{ env.XORRISO_DIR }}
          ./configure --disable-libreadline --disable-libacl --disable-xattr
          make -j$(nproc)
          # Strip the real binary (not the libtool wrapper stub)
          strip xorriso/.libs/xorriso.exe 2>/dev/null || strip xorriso/xorriso.exe

      - name: Package (tar.gz)
        if: runner.os != 'Windows'
        run: |
          mkdir -p pkg/xorriso
          cp xorriso-${{ env.XORRISO_DIR }}/xorriso/xorriso pkg/xorriso/
          echo "${{ env.XORRISO_VERSION }}" > pkg/xorriso/VERSION
          tar czf xorriso-${{ env.XORRISO_VERSION }}-${{ matrix.target }}.tar.gz -C pkg xorriso

      - name: Package (zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path pkg/xorriso
          # Copy the real binary from .libs/ (not the libtool wrapper stub)
          $realBinary = "xorriso-${{ env.XORRISO_DIR }}/xorriso/.libs/xorriso.exe"
          $wrapper = "xorriso-${{ env.XORRISO_DIR }}/xorriso/xorriso.exe"
          if (Test-Path $realBinary) {
            Copy-Item $realBinary pkg/xorriso/
          } else {
            Copy-Item $wrapper pkg/xorriso/
          }
          # Bundle MSYS2 runtime DLLs needed by xorriso
          $msysRoot = "C:\msys64\usr\bin"
          Copy-Item "$msysRoot\msys-2.0.dll" pkg/xorriso/
          Copy-Item "$msysRoot\msys-intl-8.dll" pkg/xorriso/
          Copy-Item "$msysRoot\msys-iconv-2.dll" pkg/xorriso/
          Set-Content -Path pkg/xorriso/VERSION -Value "${{ env.XORRISO_VERSION }}"

      - name: Smoke test bundle (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        env:
          PATH: /usr/bin:/bin
        run: ./pkg/xorriso/xorriso -version

      - name: Smoke test bundle (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        # cmd.exe with default Windows PATH — no msys64 — so missing DLLs surface as 0xC0000135
        run: |
          cd pkg\xorriso
          xorriso.exe -version || exit /b 1

      - name: Create zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path pkg/xorriso -DestinationPath xorriso-${{ env.XORRISO_VERSION }}-${{ matrix.target }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: xorriso-${{ matrix.target }}
          path: xorriso-${{ env.XORRISO_VERSION }}-*.*

  # ═══════════════════════════════════════════════════════════════════════
  #  Yasm — cmake build from source
  # ═══════════════════════════════════════════════════════════════════════
  build-yasm:
    name: Yasm ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            host: ""
            ext: ""
            strip: strip
          - os: macos-latest
            target: darwin-arm64
            host: ""
            ext: ""
            strip: strip
          - os: ubuntu-latest
            target: win-x64
            host: x86_64-w64-mingw32
            ext: .exe
            strip: x86_64-w64-mingw32-strip
    steps:
      - name: Install mingw-w64
        if: matrix.host != ''
        run: sudo apt-get update && sudo apt-get install -y mingw-w64

      - name: Download yasm source tarball
        run: |
          curl -L -o yasm.tar.gz \
            "https://github.com/yasm/yasm/releases/download/v${{ env.YASM_VERSION }}/yasm-${{ env.YASM_VERSION }}.tar.gz"
          tar xzf yasm.tar.gz

      - name: Build yasm
        shell: bash
        run: |
          NPROC=$(nproc 2>/dev/null || sysctl -n hw.ncpu)
          cd yasm-${{ env.YASM_VERSION }}
          CONFIGURE_ARGS=""
          if [ -n "${{ matrix.host }}" ]; then
            CONFIGURE_ARGS="--host=${{ matrix.host }}"
          fi
          ./configure $CONFIGURE_ARGS
          make -j$NPROC
          ${{ matrix.strip }} yasm${{ matrix.ext }}

      - name: Package (tar.gz)
        if: matrix.ext == ''
        run: |
          mkdir -p pkg/yasm
          cp yasm-${{ env.YASM_VERSION }}/yasm pkg/yasm/
          echo "${{ env.YASM_VERSION }}" > pkg/yasm/VERSION
          tar czf yasm-${{ env.YASM_VERSION }}-${{ matrix.target }}.tar.gz -C pkg yasm

      - name: Package (zip)
        if: matrix.ext == '.exe'
        run: |
          mkdir -p pkg/yasm
          cp yasm-${{ env.YASM_VERSION }}/yasm.exe pkg/yasm/
          echo "${{ env.YASM_VERSION }}" > pkg/yasm/VERSION
          cd pkg && zip -r ../yasm-${{ env.YASM_VERSION }}-${{ matrix.target }}.zip yasm

      # Native binaries only — Windows yasm is cross-compiled from Linux and can't run here.
      - name: Smoke test bundle
        if: matrix.ext == ''
        shell: bash
        env:
          PATH: /usr/bin:/bin
        run: ./pkg/yasm/yasm --version

      - uses: actions/upload-artifact@v4
        with:
          name: yasm-${{ matrix.target }}
          path: yasm-${{ env.YASM_VERSION }}-*.*


  # ═══════════════════════════════════════════════════════════════════════
  #  QEMU — system emulators for x64 and ARM64
  #  Builds from source with minimal dependencies (headless, no GUI)
  #  Includes edk2 UEFI firmware for ARM64
  # ═══════════════════════════════════════════════════════════════════════
  build-qemu:
    name: QEMU ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-latest
            target: darwin-arm64
          - os: windows-latest
            target: win-x64
    steps:
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 python3-venv \
            ninja-build pkg-config libglib2.0-dev libpixman-1-dev \
            libslirp-dev libsdl2-dev libfdt-dev flex bison

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install glib pixman ninja python pkg-config libslirp sdl2 dtc

      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-glib2
            mingw-w64-x86_64-pixman
            mingw-w64-x86_64-libslirp
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-python
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-meson
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-dtc
            make flex bison diffutils git

      - name: Download QEMU source
        if: runner.os != 'Windows'
        shell: bash
        run: |
          curl -L -o qemu.tar.xz \
            "https://download.qemu.org/qemu-${{ env.QEMU_VERSION }}.tar.xz"
          tar xf qemu.tar.xz 2>/dev/null || true

      - name: Download QEMU source (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          curl -L -o qemu.tar.xz \
            "https://download.qemu.org/qemu-${{ env.QEMU_VERSION }}.tar.xz"
          tar xf qemu.tar.xz 2>/dev/null || true

      - name: Download UEFI firmware
        shell: bash
        run: |
          mkdir -p firmware
          curl -L -o firmware/edk2-aarch64-code.fd.bz2 \
            "https://github.com/qemu/qemu/raw/v${{ env.QEMU_VERSION }}/pc-bios/edk2-aarch64-code.fd.bz2"
          bunzip2 firmware/edk2-aarch64-code.fd.bz2

      - name: Build QEMU (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          NPROC=$(nproc 2>/dev/null || sysctl -n hw.ncpu)
          cd qemu-${{ env.QEMU_VERSION }}
          ./configure \
            --target-list=x86_64-softmmu,aarch64-softmmu \
            --enable-slirp \
            --enable-sdl \
            --disable-docs
          # Build only the binaries we need (skip tests — broken on Windows mingw)
          ninja -C build -j$NPROC qemu-system-x86_64 qemu-system-aarch64 qemu-img

      - name: Build QEMU (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          cd qemu-${{ env.QEMU_VERSION }}
          ./configure \
            --target-list=x86_64-softmmu,aarch64-softmmu \
            --enable-slirp \
            --enable-sdl \
            --disable-docs
          # Build only the binaries we need (skip tests — broken on Windows mingw)
          ninja -C build -j$(nproc) qemu-system-x86_64.exe qemu-system-aarch64.exe qemu-img.exe

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BUILD_DIR="qemu-${{ env.QEMU_VERSION }}/build"
          mkdir -p pkg/qemu/share/qemu
          # Find binaries — macOS uses *-unsigned suffix (code signing)
          for bin in qemu-system-x86_64 qemu-system-aarch64 qemu-img; do
            SRC=$(find "$BUILD_DIR" -maxdepth 2 \( -name "$bin" -o -name "${bin}-unsigned" \) -type f | head -1)
            if [ -n "$SRC" ]; then
              cp "$SRC" "pkg/qemu/$bin"
            fi
          done
          strip pkg/qemu/qemu-system-* pkg/qemu/qemu-img 2>/dev/null || true
          # Verify binaries exist
          ls -la pkg/qemu/qemu-system-*

          # Bundle shared libraries so QEMU runs without system deps
          mkdir -p pkg/qemu/lib
          collect_deps() {
            local binary="$1"
            if [ "${{ runner.os }}" = "Linux" ]; then
              ldd "$binary" 2>/dev/null | grep "=> /" | awk '{print $3}' || true
            else
              otool -L "$binary" 2>/dev/null | awk '/\/opt\/homebrew|\/usr\/local/{print $1}' || true
            fi
          }
          SKIP_LIBS="libc.so|libm.so|libdl.so|libpthread.so|librt.so|ld-linux|libSystem.B"
          copy_deps() {
            local binary="$1"
            collect_deps "$binary" | while read -r lib; do
              if ! echo "$lib" | grep -qE "$SKIP_LIBS"; then
                cp -n "$lib" pkg/qemu/lib/ 2>/dev/null || true
              fi
            done || true
          }
          # Pass 1: direct deps of QEMU binaries
          for bin in pkg/qemu/qemu-system-x86_64 pkg/qemu/qemu-system-aarch64 pkg/qemu/qemu-img; do
            [ -f "$bin" ] || continue
            copy_deps "$bin"
          done
          # Pass 2: transitive deps of bundled libs
          for lib in pkg/qemu/lib/*; do
            [ -f "$lib" ] || continue
            copy_deps "$lib"
          done
          echo "Bundled shared libraries:"
          ls -la pkg/qemu/lib/ || echo "(no libraries bundled)"

          # Create wrapper scripts that set library path
          if [ "${{ runner.os }}" = "Linux" ]; then
            LIB_VAR="LD_LIBRARY_PATH"
          else
            LIB_VAR="DYLD_LIBRARY_PATH"
          fi
          for bin in qemu-system-x86_64 qemu-system-aarch64 qemu-img; do
            [ -f "pkg/qemu/$bin" ] || continue
            mv "pkg/qemu/$bin" "pkg/qemu/$bin.real"
            {
              echo '#!/bin/sh'
              echo 'DIR="$(cd "$(dirname "$0")" && pwd)"'
              echo "export ${LIB_VAR}=\"\$DIR/lib\${${LIB_VAR}:+:\$${LIB_VAR}}\""
              # QEMU ignores QEMU_DATADIR; it searches exec_dir/../share/qemu.
              # Our layout keeps share/qemu as a sibling of the binary, so pass -L explicitly.
              echo 'exec "$DIR/$(basename "$0").real" -L "$DIR/share/qemu" "$@"'
            } > "pkg/qemu/$bin"
            chmod +x "pkg/qemu/$bin"
          done

          # Copy firmware files from build dir (directories) and source tree (BIOS binaries)
          cp -r "$BUILD_DIR"/pc-bios/* pkg/qemu/share/qemu/ 2>/dev/null || true
          cp qemu-${{ env.QEMU_VERSION }}/pc-bios/*.bin pkg/qemu/share/qemu/ 2>/dev/null || true
          cp qemu-${{ env.QEMU_VERSION }}/pc-bios/*.rom pkg/qemu/share/qemu/ 2>/dev/null || true
          cp firmware/edk2-aarch64-code.fd pkg/qemu/share/qemu/
          echo "=== Firmware files packaged ==="
          ls pkg/qemu/share/qemu/*.bin pkg/qemu/share/qemu/*.fd 2>/dev/null || echo "WARNING: no firmware files found"
          # Stamp the bundle with its version (see Windows packaging step for rationale)
          echo "${{ env.QEMU_VERSION }}" > pkg/qemu/VERSION
          tar czf qemu-${{ env.QEMU_VERSION }}-${{ matrix.target }}.tar.gz -C pkg qemu

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          BUILD_DIR="qemu-${{ env.QEMU_VERSION }}/build"
          # Windows layout: exes + DLLs + BIOS/firmware all in qemu/bin/. QEMU's
          # os_find_datadir() on Windows returns only qemu_get_exec_dir() (it does
          # NOT search <exec>/../share/qemu like the Linux/macOS wrapper assumes),
          # so the BIOS files must live in the same directory as the exe for
          # automatic lookup to work without -L. The Linux/macOS bundles keep
          # the share/qemu/ tree because they ship a wrapper script that passes
          # -L "$DIR/share/qemu".
          mkdir -p pkg/qemu/bin
          find "$BUILD_DIR" -maxdepth 2 -name 'qemu-system-x86_64.exe' -type f | head -1 | xargs -I{} cp {} pkg/qemu/bin/
          find "$BUILD_DIR" -maxdepth 2 -name 'qemu-system-aarch64.exe' -type f | head -1 | xargs -I{} cp {} pkg/qemu/bin/
          find "$BUILD_DIR" -maxdepth 2 -name 'qemu-img.exe' -type f | head -1 | xargs -I{} cp {} pkg/qemu/bin/ 2>/dev/null || true
          strip pkg/qemu/bin/*.exe 2>/dev/null || true
          ls -la pkg/qemu/bin/qemu-system-*
          # Copy BIOS/firmware files directly alongside the exes
          cp -r "$BUILD_DIR"/pc-bios/* pkg/qemu/bin/ 2>/dev/null || true
          cp qemu-${{ env.QEMU_VERSION }}/pc-bios/*.bin pkg/qemu/bin/ 2>/dev/null || true
          cp qemu-${{ env.QEMU_VERSION }}/pc-bios/*.rom pkg/qemu/bin/ 2>/dev/null || true
          cp firmware/edk2-aarch64-code.fd pkg/qemu/bin/
          # Bundle MINGW64 runtime DLLs by walking PE imports transitively.
          # objdump -p lists each DLL imported by a binary; we recurse so deps
          # of deps (e.g. libgio -> libgmodule -> libffi) are captured. Anything
          # that doesn't resolve under /mingw64/bin is assumed to be a Windows
          # system DLL (kernel32, ole32, api-ms-win-*) and skipped. DLLs land
          # in pkg/qemu/bin/ alongside the exes so Windows' loader finds them.
          MINGW_BIN="/mingw64/bin"
          declare -A seen
          queue=()
          for exe in pkg/qemu/bin/qemu-system-x86_64.exe pkg/qemu/bin/qemu-system-aarch64.exe pkg/qemu/bin/qemu-img.exe; do
            [ -f "$exe" ] && queue+=("$exe")
          done
          while [ ${#queue[@]} -gt 0 ]; do
            cur="${queue[0]}"
            queue=("${queue[@]:1}")
            base_lc=$(basename "$cur" | tr '[:upper:]' '[:lower:]')
            [ -n "${seen[$base_lc]:-}" ] && continue
            seen[$base_lc]=1
            while IFS= read -r dll; do
              dll_lc=$(echo "$dll" | tr '[:upper:]' '[:lower:]')
              [ -n "${seen[$dll_lc]:-}" ] && continue
              src="$MINGW_BIN/$dll"
              if [ -f "$src" ]; then
                dest="pkg/qemu/bin/$dll"
                [ -f "$dest" ] || cp "$src" "$dest"
                queue+=("$dest")
              fi
            done < <(objdump -p "$cur" 2>/dev/null | awk '/DLL Name:/ {print $3}')
          done
          # Stamp the bundle with its version so the resolver can compare
          # against system-installed QEMU and accept it when versions match.
          echo "${{ env.QEMU_VERSION }}" > pkg/qemu/VERSION
          echo "=== Bundled MINGW64 DLLs ==="
          ls pkg/qemu/bin/*.dll

      # Smoke-test the packaged binaries in a clean environment so missing
      # runtime deps (e.g. the libbz2/libfdt/libzstd Windows regression that
      # caused STATUS_DLL_NOT_FOUND) fail CI before publish, not in users' VMs.
      - name: Smoke test bundle (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        env:
          PATH: /usr/bin:/bin
        run: |
          cd pkg/qemu
          ./qemu-system-x86_64 --version
          ./qemu-system-aarch64 --version
          [ -f qemu-img ] && ./qemu-img --version || true

      - name: Smoke test bundle (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        # cmd.exe runs with the default Windows PATH only — no /mingw64/bin —
        # so any missing transitive DLL surfaces here as exit 0xC0000135.
        # File-existence checks enforce the layout invariant: on Windows QEMU's
        # os_find_datadir() returns just exec_dir (NOT exec_dir/../share/qemu),
        # so BIOS/firmware files must live next to the exe to be auto-found.
        run: |
          cd pkg\qemu\bin
          qemu-system-x86_64.exe --version || exit /b 1
          qemu-system-aarch64.exe --version || exit /b 1
          if exist qemu-img.exe ( qemu-img.exe --version || exit /b 1 )
          if not exist bios-256k.bin ( echo ERROR: bios-256k.bin must sit next to qemu exe ^(Windows looks in exec_dir, not share/qemu^) & exit /b 1 )
          if not exist edk2-aarch64-code.fd ( echo ERROR: ARM64 UEFI firmware must sit next to qemu exe & exit /b 1 )
          echo OK: BIOS and firmware files present in exec_dir

      - name: Create zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path pkg/qemu -DestinationPath qemu-${{ env.QEMU_VERSION }}-${{ matrix.target }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: qemu-${{ matrix.target }}
          path: qemu-${{ env.QEMU_VERSION }}-*.*

  # ═══════════════════════════════════════════════════════════════════════
  #  Release — collect all artifacts and create a GitHub release
  # ═══════════════════════════════════════════════════════════════════════
  release:
    name: Create Release
    needs:
      - build-llvm
      - build-xorriso
      - build-yasm
      - build-qemu
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Delete previous release (if exists)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete tools-latest --yes --cleanup-tag --repo ${{ github.repository }} 2>/dev/null || true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: tools-latest
          name: "Cosmos Tools (LLVM ${{ env.LLVM_VERSION }}, QEMU ${{ env.QEMU_VERSION }}, Yasm ${{ env.YASM_VERSION }}, xorriso ${{ env.XORRISO_VERSION }})"
          body: |
            Pre-built development tools for Cosmos kernel development.

            ## Versions
            | Tool | Version |
            |------|---------|
            | LLVM (Clang + LLD) | ${{ env.LLVM_VERSION }} |
            | xorriso | ${{ env.XORRISO_VERSION }} |
            | Yasm | ${{ env.YASM_VERSION }} |
            | QEMU | ${{ env.QEMU_VERSION }} |

            ## Platforms
            - `linux-x64` — .tar.gz archives
            - `darwin-arm64` — .tar.gz archives
            - `win-x64` — .zip archives
          files: artifacts/*
          draft: false
          prerelease: false
