name: Build Tools

on:
  push:
    branches: [feature/buildTools]
    paths: [.github/workflows/build-tools.yml]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub release with the built tools'
        required: false
        type: boolean
        default: false

env:
  LLD_VERSION: "22.1.3"
  LLVM_TAG: "llvmorg-22.1.3"
  XORRISO_VERSION: "1.5.8.pl01"
  XORRISO_DIR: "1.5.8"
  YASM_VERSION: "1.3.0"
  GCC_VERSION: "15.2.0"
  BINUTILS_VERSION: "2.46.0"
  QEMU_VERSION: "10.2.2"

jobs:
  # ═══════════════════════════════════════════════════════════════════════
  #  LLD — build from LLVM source tarballs (not full repo clone)
  # ═══════════════════════════════════════════════════════════════════════
  build-lld:
    name: LLD ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-latest
            target: darwin-arm64
          - os: windows-latest
            target: win-x64
    steps:
      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build

      - name: Install build tools (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja

      - name: Download LLVM source
        shell: bash
        run: |
          curl -L -o llvm-project.tar.xz \
            "https://github.com/llvm/llvm-project/releases/download/${{ env.LLVM_TAG }}/llvm-project-${{ env.LLD_VERSION }}.src.tar.xz"
          tar xf llvm-project.tar.xz 2>/dev/null || true
          mv llvm-project-${{ env.LLD_VERSION }}.src llvm-project

      - name: Configure & build LLD (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cmake -S llvm-project/llvm -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_ENABLE_PROJECTS="lld" \
            -DLLVM_TARGETS_TO_BUILD="X86;AArch64" \
            -DLLVM_INCLUDE_TESTS=OFF \
            -DLLVM_INCLUDE_BENCHMARKS=OFF \
            -DLLVM_INCLUDE_EXAMPLES=OFF \
            -DLLVM_INCLUDE_DOCS=OFF \
            -DLLVM_PARALLEL_LINK_JOBS=1
          NPROC=$(nproc 2>/dev/null || sysctl -n hw.ncpu)
          cmake --build build --target lld -- -j$NPROC
          strip build/bin/ld.lld

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure & build LLD (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          cmake -S llvm-project/llvm -B build -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_C_COMPILER=cl ^
            -DCMAKE_CXX_COMPILER=cl ^
            -DLLVM_ENABLE_PROJECTS="lld" ^
            -DLLVM_TARGETS_TO_BUILD="X86;AArch64" ^
            -DLLVM_INCLUDE_TESTS=OFF ^
            -DLLVM_INCLUDE_BENCHMARKS=OFF ^
            -DLLVM_INCLUDE_EXAMPLES=OFF ^
            -DLLVM_INCLUDE_DOCS=OFF ^
            -DLLVM_PARALLEL_LINK_JOBS=1
          cmake --build build --target lld

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p pkg/lld
          cp build/bin/ld.lld pkg/lld/
          tar czf lld-${{ env.LLD_VERSION }}-${{ matrix.target }}.tar.gz -C pkg lld

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path pkg/lld
          Copy-Item build/bin/ld.lld.exe pkg/lld/
          Compress-Archive -Path pkg/lld -DestinationPath lld-${{ env.LLD_VERSION }}-${{ matrix.target }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: lld-${{ matrix.target }}
          path: lld-*.*

  # ═══════════════════════════════════════════════════════════════════════
  #  xorriso — build from GNU source tarball
  #  Linux job also cross-compiles for Windows using mingw-w64
  # ═══════════════════════════════════════════════════════════════════════
  build-xorriso:
    name: xorriso ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-latest
            target: darwin-arm64
          - os: windows-latest
            target: win-x64
    steps:
      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          install: make gcc pkg-config libiconv-devel

      - name: Download xorriso source (Unix)
        if: runner.os != 'Windows'
        run: |
          curl -L -o xorriso.tar.gz \
            "https://www.gnu.org/software/xorriso/xorriso-${{ env.XORRISO_VERSION }}.tar.gz"
          tar xzf xorriso.tar.gz

      - name: Download xorriso source (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          curl -L -o xorriso.tar.gz \
            "https://www.gnu.org/software/xorriso/xorriso-${{ env.XORRISO_VERSION }}.tar.gz"
          tar xzf xorriso.tar.gz

      - name: Build xorriso (Unix)
        if: runner.os != 'Windows'
        run: |
          NPROC=$(nproc 2>/dev/null || sysctl -n hw.ncpu)
          cd xorriso-${{ env.XORRISO_DIR }}
          ./configure --disable-libreadline --disable-libacl --disable-xattr
          make -j$NPROC
          strip xorriso/xorriso

      - name: Build xorriso (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          cd xorriso-${{ env.XORRISO_DIR }}
          ./configure --disable-libreadline --disable-libacl --disable-xattr
          make -j$(nproc)
          strip xorriso/xorriso.exe

      - name: Package (tar.gz)
        if: runner.os != 'Windows'
        run: |
          mkdir -p pkg/xorriso
          cp xorriso-${{ env.XORRISO_DIR }}/xorriso/xorriso pkg/xorriso/
          tar czf xorriso-${{ env.XORRISO_VERSION }}-${{ matrix.target }}.tar.gz -C pkg xorriso

      - name: Package (zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path pkg/xorriso
          Copy-Item xorriso-${{ env.XORRISO_DIR }}/xorriso/xorriso.exe pkg/xorriso/
          # Bundle MSYS2 runtime DLLs needed by xorriso
          $msysRoot = "C:\msys64\usr\bin"
          Copy-Item "$msysRoot\msys-2.0.dll" pkg/xorriso/
          Copy-Item "$msysRoot\msys-intl-8.dll" pkg/xorriso/
          Copy-Item "$msysRoot\msys-iconv-2.dll" pkg/xorriso/
          Compress-Archive -Path pkg/xorriso -DestinationPath xorriso-${{ env.XORRISO_VERSION }}-${{ matrix.target }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: xorriso-${{ matrix.target }}
          path: xorriso-${{ env.XORRISO_VERSION }}-*.*

  # ═══════════════════════════════════════════════════════════════════════
  #  Yasm — cmake build from source
  # ═══════════════════════════════════════════════════════════════════════
  build-yasm:
    name: Yasm ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            host: ""
            ext: ""
            strip: strip
          - os: macos-latest
            target: darwin-arm64
            host: ""
            ext: ""
            strip: strip
          - os: ubuntu-latest
            target: win-x64
            host: x86_64-w64-mingw32
            ext: .exe
            strip: x86_64-w64-mingw32-strip
    steps:
      - name: Install mingw-w64
        if: matrix.host != ''
        run: sudo apt-get update && sudo apt-get install -y mingw-w64

      - name: Download yasm source tarball
        run: |
          curl -L -o yasm.tar.gz \
            "https://github.com/yasm/yasm/releases/download/v${{ env.YASM_VERSION }}/yasm-${{ env.YASM_VERSION }}.tar.gz"
          tar xzf yasm.tar.gz

      - name: Build yasm
        shell: bash
        run: |
          NPROC=$(nproc 2>/dev/null || sysctl -n hw.ncpu)
          cd yasm-${{ env.YASM_VERSION }}
          CONFIGURE_ARGS=""
          if [ -n "${{ matrix.host }}" ]; then
            CONFIGURE_ARGS="--host=${{ matrix.host }}"
          fi
          ./configure $CONFIGURE_ARGS
          make -j$NPROC
          ${{ matrix.strip }} yasm${{ matrix.ext }}

      - name: Package (tar.gz)
        if: matrix.ext == ''
        run: |
          mkdir -p pkg/yasm
          cp yasm-${{ env.YASM_VERSION }}/yasm pkg/yasm/
          tar czf yasm-${{ env.YASM_VERSION }}-${{ matrix.target }}.tar.gz -C pkg yasm

      - name: Package (zip)
        if: matrix.ext == '.exe'
        run: |
          mkdir -p pkg/yasm
          cp yasm-${{ env.YASM_VERSION }}/yasm.exe pkg/yasm/
          cd pkg && zip -r ../yasm-${{ env.YASM_VERSION }}-${{ matrix.target }}.zip yasm

      - uses: actions/upload-artifact@v4
        with:
          name: yasm-${{ matrix.target }}
          path: yasm-${{ env.YASM_VERSION }}-*.*

  # ═══════════════════════════════════════════════════════════════════════
  #  x86_64-elf-gcc — cross-compiler for bare-metal x64 kernels
  #  Builds binutils + GCC from source
  #  win-x64 is cross-compiled from Linux using mingw-w64
  # ═══════════════════════════════════════════════════════════════════════
  build-gcc-x64:
    name: x86_64-elf-gcc ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            host: ""
            strip: strip
            ext: ""
          - os: macos-latest
            target: darwin-arm64
            host: ""
            strip: strip
            ext: ""
          - os: ubuntu-latest
            target: win-x64
            host: x86_64-w64-mingw32
            strip: x86_64-w64-mingw32-strip
            ext: .exe
    env:
      TARGET: x86_64-elf
      TOOLDIR: x86_64-elf-tools
    steps:
      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential texinfo bison flex \
            libgmp-dev libmpfr-dev libmpc-dev libisl-dev \
            ${{ matrix.host != '' && 'mingw-w64' || '' }}

      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install gmp mpfr libmpc isl texinfo bison flex

      - name: Download sources
        shell: bash
        run: |
          curl -L -o binutils.tar.xz "https://ftpmirror.gnu.org/gnu/binutils/binutils-${{ env.BINUTILS_VERSION }}.tar.xz"
          curl -L -o gcc.tar.xz "https://ftp.gnu.org/gnu/gcc/gcc-${{ env.GCC_VERSION }}/gcc-${{ env.GCC_VERSION }}.tar.xz"
          tar xf binutils.tar.xz
          tar xf gcc.tar.xz

      - name: Download GCC prerequisites
        shell: bash
        run: cd gcc-${{ env.GCC_VERSION }} && ./contrib/download_prerequisites

      - name: Patch zlib fdopen for macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          sed -i '' 's|^#define fdopen(fd,mode) NULL|#ifndef fdopen\n#define fdopen(fd,mode) NULL /* No fdopen() */\n#endif|' \
            gcc-${{ env.GCC_VERSION }}/zlib/zutil.h

      - name: Build binutils
        shell: bash
        run: |
          NPROC=$(nproc 2>/dev/null || sysctl -n hw.ncpu)
          export PREFIX=$(pwd)/output
          HOST_ARG=""
          if [ -n "${{ matrix.host }}" ]; then
            HOST_ARG="--host=${{ matrix.host }}"
          fi
          mkdir build-binutils && cd build-binutils
          ../binutils-${{ env.BINUTILS_VERSION }}/configure \
            --target=${{ env.TARGET }} \
            $HOST_ARG \
            --prefix="$PREFIX" \
            --with-sysroot \
            --disable-nls \
            --disable-werror
          make -j$NPROC
          make install

      - name: Build GCC
        shell: bash
        run: |
          NPROC=$(nproc 2>/dev/null || sysctl -n hw.ncpu)
          export PREFIX=$(pwd)/output
          export PATH="$PREFIX/bin:$PATH"
          HOST_ARG=""
          if [ -n "${{ matrix.host }}" ]; then
            HOST_ARG="--host=${{ matrix.host }}"
          fi
          mkdir build-gcc && cd build-gcc
          ../gcc-${{ env.GCC_VERSION }}/configure \
            --target=${{ env.TARGET }} \
            $HOST_ARG \
            --prefix="$PREFIX" \
            --disable-nls \
            --enable-languages=c,c++ \
            --without-headers \
            --disable-hosted-libstdcxx
          make -j$NPROC all-gcc all-target-libgcc
          make install-gcc install-target-libgcc

      - name: Strip binaries
        shell: bash
        run: |
          find output/bin -type f \( -executable -o -name '*.exe' \) -exec ${{ matrix.strip }} {} \; 2>/dev/null || true
          find output/libexec -type f \( -executable -o -name '*.exe' \) -exec ${{ matrix.strip }} {} \; 2>/dev/null || true

      - name: Package (tar.gz)
        if: matrix.ext == ''
        shell: bash
        run: |
          mv output ${{ env.TOOLDIR }}
          tar czf ${{ env.TOOLDIR }}-${{ env.GCC_VERSION }}-${{ matrix.target }}.tar.gz ${{ env.TOOLDIR }}

      - name: Package (zip)
        if: matrix.ext == '.exe'
        run: |
          mv output ${{ env.TOOLDIR }}
          zip -r ${{ env.TOOLDIR }}-${{ env.GCC_VERSION }}-${{ matrix.target }}.zip ${{ env.TOOLDIR }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.TOOLDIR }}-${{ matrix.target }}
          path: ${{ env.TOOLDIR }}-*.*

  # ═══════════════════════════════════════════════════════════════════════
  #  aarch64-none-elf-gcc — cross-compiler for bare-metal ARM64 kernels
  #  Builds binutils + GCC from source
  #  win-x64 is cross-compiled from Linux using mingw-w64
  # ═══════════════════════════════════════════════════════════════════════
  build-gcc-arm64:
    name: aarch64-none-elf-gcc ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            host: ""
            strip: strip
            ext: ""
          - os: macos-latest
            target: darwin-arm64
            host: ""
            strip: strip
            ext: ""
          - os: ubuntu-latest
            target: win-x64
            host: x86_64-w64-mingw32
            strip: x86_64-w64-mingw32-strip
            ext: .exe
    env:
      TARGET: aarch64-none-elf
      TOOLDIR: aarch64-elf-tools
    steps:
      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential texinfo bison flex \
            libgmp-dev libmpfr-dev libmpc-dev libisl-dev \
            ${{ matrix.host != '' && 'mingw-w64' || '' }}

      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install gmp mpfr libmpc isl texinfo bison flex

      - name: Download sources
        shell: bash
        run: |
          curl -L -o binutils.tar.xz "https://ftpmirror.gnu.org/gnu/binutils/binutils-${{ env.BINUTILS_VERSION }}.tar.xz"
          curl -L -o gcc.tar.xz "https://ftp.gnu.org/gnu/gcc/gcc-${{ env.GCC_VERSION }}/gcc-${{ env.GCC_VERSION }}.tar.xz"
          tar xf binutils.tar.xz
          tar xf gcc.tar.xz

      - name: Download GCC prerequisites
        shell: bash
        run: cd gcc-${{ env.GCC_VERSION }} && ./contrib/download_prerequisites

      - name: Patch zlib fdopen for macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          sed -i '' 's|^#define fdopen(fd,mode) NULL|#ifndef fdopen\n#define fdopen(fd,mode) NULL /* No fdopen() */\n#endif|' \
            gcc-${{ env.GCC_VERSION }}/zlib/zutil.h

      - name: Build binutils
        shell: bash
        run: |
          NPROC=$(nproc 2>/dev/null || sysctl -n hw.ncpu)
          export PREFIX=$(pwd)/output
          HOST_ARG=""
          if [ -n "${{ matrix.host }}" ]; then
            HOST_ARG="--host=${{ matrix.host }}"
          fi
          mkdir build-binutils && cd build-binutils
          ../binutils-${{ env.BINUTILS_VERSION }}/configure \
            --target=${{ env.TARGET }} \
            $HOST_ARG \
            --prefix="$PREFIX" \
            --with-sysroot \
            --disable-nls \
            --disable-werror
          make -j$NPROC
          make install

      - name: Build GCC
        shell: bash
        run: |
          NPROC=$(nproc 2>/dev/null || sysctl -n hw.ncpu)
          export PREFIX=$(pwd)/output
          export PATH="$PREFIX/bin:$PATH"
          HOST_ARG=""
          if [ -n "${{ matrix.host }}" ]; then
            HOST_ARG="--host=${{ matrix.host }}"
          fi
          mkdir build-gcc && cd build-gcc
          ../gcc-${{ env.GCC_VERSION }}/configure \
            --target=${{ env.TARGET }} \
            $HOST_ARG \
            --prefix="$PREFIX" \
            --disable-nls \
            --enable-languages=c,c++ \
            --without-headers \
            --disable-hosted-libstdcxx
          make -j$NPROC all-gcc all-target-libgcc
          make install-gcc install-target-libgcc

      - name: Strip binaries
        shell: bash
        run: |
          find output/bin -type f \( -executable -o -name '*.exe' \) -exec ${{ matrix.strip }} {} \; 2>/dev/null || true
          find output/libexec -type f \( -executable -o -name '*.exe' \) -exec ${{ matrix.strip }} {} \; 2>/dev/null || true

      - name: Package (tar.gz)
        if: matrix.ext == ''
        shell: bash
        run: |
          mv output ${{ env.TOOLDIR }}
          tar czf ${{ env.TOOLDIR }}-${{ env.GCC_VERSION }}-${{ matrix.target }}.tar.gz ${{ env.TOOLDIR }}

      - name: Package (zip)
        if: matrix.ext == '.exe'
        run: |
          mv output ${{ env.TOOLDIR }}
          zip -r ${{ env.TOOLDIR }}-${{ env.GCC_VERSION }}-${{ matrix.target }}.zip ${{ env.TOOLDIR }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.TOOLDIR }}-${{ matrix.target }}
          path: ${{ env.TOOLDIR }}-*.*

  # ═══════════════════════════════════════════════════════════════════════
  #  QEMU — system emulators for x64 and ARM64
  #  Builds from source with minimal dependencies (headless, no GUI)
  #  Includes edk2 UEFI firmware for ARM64
  # ═══════════════════════════════════════════════════════════════════════
  build-qemu:
    name: QEMU ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-latest
            target: darwin-arm64
          - os: windows-latest
            target: win-x64
    steps:
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 python3-venv \
            ninja-build pkg-config libglib2.0-dev libpixman-1-dev \
            libslirp-dev libsdl2-dev flex bison

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install glib pixman ninja python pkg-config libslirp sdl2

      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-glib2
            mingw-w64-x86_64-pixman
            mingw-w64-x86_64-libslirp
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-python
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-meson
            mingw-w64-x86_64-SDL2
            make flex bison diffutils

      - name: Download QEMU source
        shell: bash
        run: |
          curl -L -o qemu.tar.xz \
            "https://download.qemu.org/qemu-${{ env.QEMU_VERSION }}.tar.xz"
          tar xf qemu.tar.xz

      - name: Download QEMU source (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          curl -L -o qemu.tar.xz \
            "https://download.qemu.org/qemu-${{ env.QEMU_VERSION }}.tar.xz"
          tar xf qemu.tar.xz

      - name: Build QEMU (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          NPROC=$(nproc 2>/dev/null || sysctl -n hw.ncpu)
          cd qemu-${{ env.QEMU_VERSION }}
          ./configure \
            --target-list=x86_64-softmmu,aarch64-softmmu \
            --enable-slirp \
            --enable-sdl \
            --disable-docs
          make -j$NPROC

      - name: Build QEMU (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          cd qemu-${{ env.QEMU_VERSION }}
          ./configure \
            --target-list=x86_64-softmmu,aarch64-softmmu \
            --enable-slirp \
            --enable-sdl \
            --disable-docs
          make -j$(nproc)

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p pkg/qemu/share/qemu
          cp qemu-${{ env.QEMU_VERSION }}/build/qemu-system-x86_64 pkg/qemu/
          cp qemu-${{ env.QEMU_VERSION }}/build/qemu-system-aarch64 pkg/qemu/
          cp qemu-${{ env.QEMU_VERSION }}/build/qemu-img pkg/qemu/ 2>/dev/null || true
          strip pkg/qemu/qemu-system-* pkg/qemu/qemu-img 2>/dev/null || true
          # Copy firmware files
          cp -r qemu-${{ env.QEMU_VERSION }}/build/pc-bios/* pkg/qemu/share/qemu/ 2>/dev/null || true
          cp qemu-${{ env.QEMU_VERSION }}/pc-bios/edk2-*.fd pkg/qemu/share/qemu/ 2>/dev/null || true
          tar czf qemu-${{ env.QEMU_VERSION }}-${{ matrix.target }}.tar.gz -C pkg qemu

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          mkdir -p pkg/qemu/share/qemu
          cp qemu-${{ env.QEMU_VERSION }}/build/qemu-system-x86_64.exe pkg/qemu/
          cp qemu-${{ env.QEMU_VERSION }}/build/qemu-system-aarch64.exe pkg/qemu/
          cp qemu-${{ env.QEMU_VERSION }}/build/qemu-img.exe pkg/qemu/ 2>/dev/null || true
          strip pkg/qemu/*.exe 2>/dev/null || true
          # Copy firmware files
          cp -r qemu-${{ env.QEMU_VERSION }}/build/pc-bios/* pkg/qemu/share/qemu/ 2>/dev/null || true
          cp qemu-${{ env.QEMU_VERSION }}/pc-bios/edk2-*.fd pkg/qemu/share/qemu/ 2>/dev/null || true
          # Bundle MINGW64 runtime DLLs
          MINGW_BIN="/mingw64/bin"
          for dll in libglib-2.0-0.dll libgthread-2.0-0.dll libintl-8.dll libiconv-2.dll \
                     libpixman-1-0.dll libslirp-0.dll zlib1.dll libpcre2-8-0.dll \
                     libgcc_s_seh-1.dll libwinpthread-1.dll libstdc++-6.dll libffi-8.dll \
                     SDL2.dll; do
            cp "$MINGW_BIN/$dll" pkg/qemu/ 2>/dev/null || true
          done

      - name: Create zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path pkg/qemu -DestinationPath qemu-${{ env.QEMU_VERSION }}-${{ matrix.target }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: qemu-${{ matrix.target }}
          path: qemu-${{ env.QEMU_VERSION }}-*.*

  # ═══════════════════════════════════════════════════════════════════════
  #  Release — collect all artifacts and create a GitHub release
  # ═══════════════════════════════════════════════════════════════════════
  release:
    name: Create Release
    if: inputs.create_release
    needs:
      - build-lld
      - build-xorriso
      - build-yasm
      - build-gcc-x64
      - build-gcc-arm64
      - build-qemu
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: tools-v${{ github.run_number }}
          name: "Cosmos Tools (LLD ${{ env.LLD_VERSION }}, GCC ${{ env.GCC_VERSION }}, QEMU ${{ env.QEMU_VERSION }}, Yasm ${{ env.YASM_VERSION }}, xorriso ${{ env.XORRISO_VERSION }})"
          body: |
            Pre-built development tools for Cosmos kernel development.

            ## Versions
            | Tool | Version |
            |------|---------|
            | LLD | ${{ env.LLD_VERSION }} |
            | xorriso | ${{ env.XORRISO_VERSION }} |
            | Yasm | ${{ env.YASM_VERSION }} |
            | GCC (x86_64-elf + aarch64-none-elf) | ${{ env.GCC_VERSION }} |
            | Binutils | ${{ env.BINUTILS_VERSION }} |
            | QEMU | ${{ env.QEMU_VERSION }} |

            ## Platforms
            - `linux-x64` — .tar.gz archives
            - `darwin-arm64` — .tar.gz archives
            - `win-x64` — .zip archives

            Install with: `cosmos install --auto --tools`
          files: artifacts/*
          draft: false
          prerelease: false
