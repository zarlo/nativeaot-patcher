name: Kernel Setup

on:
  workflow_call:

jobs:
  build:
    name: Build Cosmos Packages & Cache Tools
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      matrix:
        dotnet-version: [ 10.0.x ]
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 🛠️ Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: 🗑️ Clear NuGet Cache
        run: dotnet nuget locals all --clear

      - name: 📦 Build and Install Cosmos Packages (multi-arch)
        run: ./.devcontainer/postCreateCommand.sh
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1
          DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1

      - name: 📤 Upload Cosmos Packages
        uses: actions/upload-artifact@v4
        with:
          name: cosmos-packages
          path: artifacts/package/release/*.nupkg
          retention-days: 1

      - name: 🔧 Install Build Tools
        run: |
          sudo apt-get clean
          cosmos install --auto --tools

      - name: 🔍 Verify Tools Installation
        run: cosmos check

      - name: 📦 Package build tools debs
        run: |
          mkdir -p build-tools-cache
          cp /var/cache/apt/archives/*.deb build-tools-cache/ 2>/dev/null || true
          echo "Cached $(ls build-tools-cache/*.deb 2>/dev/null | wc -l) deb packages ($(du -sh build-tools-cache/ | cut -f1))"

      - name: 📤 Upload Build Tools Cache
        uses: actions/upload-artifact@v4
        with:
          name: build-tools-cache
          path: build-tools-cache/
          retention-days: 1
          compression-level: 1
