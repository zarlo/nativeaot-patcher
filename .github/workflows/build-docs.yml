name: Build Docs

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/**'

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Install DocFX
      shell: pwsh
      run: |
        dotnet tool update -g docfx
        echo "$env:USERPROFILE\.dotnet\tools" >> $env:GITHUB_PATH

    # Restore only what DocFX consumes (the src/Cosmos.Kernel.* projects).
    # Restoring nativeaot-patcher.slnx pulls in examples/DevKernel, whose
    # NuGet.Config requires the artifacts/package/release local source — that
    # folder doesn't exist on a fresh checkout, so the slnx restore fails with
    # NU1301. Cosmos.Kernel transitively project-references everything DocFX
    # needs, so restoring it alone is sufficient and avoids the local source.
    - name: Restore docs projects
      shell: pwsh
      run: dotnet restore src/Cosmos.Kernel/Cosmos.Kernel.csproj

    - name: Build Docs
      shell: pwsh
      run: |
        cd docs
        docfx docfx.json

    - name: Verify output
      shell: pwsh
      run: Get-ChildItem -Recurse docs/_site

    - name: Publish to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: ./docs/_site
